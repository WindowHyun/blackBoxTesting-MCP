name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Lint gate (was missing despite shipping py.typed). ruff blocks; mypy runs
  # informationally — the codebase's Playwright optional-init pattern isn't
  # strict-clean yet, so type errors are surfaced but don't fail the build.
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -e ".[dev]"
      - run: ruff check blackbox_mcp
      - run: mypy blackbox_mcp || true

  # Fast lane: no browser download — unit tests only (-m "not browser").
  # Matrix covers Windows/macOS since Claude Desktop is a cross-platform client.
  unit:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -e ".[dev]"
      - run: python -m pytest -q -m "not browser"

  # Full lane: everything, with real Chromium (integration + E2E + modes).
  browser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -e ".[dev]"
      - run: python -m playwright install --with-deps chromium
      - run: python -m pytest -q
