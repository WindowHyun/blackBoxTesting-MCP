name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Fast lane: no browser download — unit tests only (-m "not browser").
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -e ".[dev]"
      - run: python -m pytest -q -m "not browser"

  # Full lane: everything, with real Chromium (integration + E2E + modes).
  browser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -e ".[dev]"
      - run: python -m playwright install --with-deps chromium
      - run: python -m pytest -q
