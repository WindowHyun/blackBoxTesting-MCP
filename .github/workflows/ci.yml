name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Lint gate (was missing despite shipping py.typed). Both block: the suite
  # is ruff- and mypy-clean (the Playwright optional-init attrs are typed Any
  # with runtime liveness guards), and a clean gate only helps if it fails on
  # regressions. mypy's major is capped in pyproject so a new mypy release
  # can't break CI on an unrelated PR.
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -e ".[dev]"
      - run: ruff check blackbox_mcp
      - run: mypy blackbox_mcp

  # Fast lane: no browser download — unit tests only (-m "not browser").
  # Matrix covers Windows/macOS since Claude Desktop is a cross-platform client.
  unit:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -e ".[dev]"
      - run: python -m pytest -q -m "not browser"

  # Full lane: everything, with real Chromium (integration + E2E + modes).
  browser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -e ".[dev]"
      - run: python -m playwright install --with-deps chromium
      - run: python -m pytest -q
